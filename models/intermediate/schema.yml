version: 2

models:
  - name: int_orders
    description: One row per purchase order derived from GA4 purchase events.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: order_date
        tests:
          - not_null
  - name: int_refunds
    description: One row per refunded order derived from GA4 refund events.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
